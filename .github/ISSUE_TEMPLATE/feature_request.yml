name: Feature Request
description: Suggest a product or engineering improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe the smallest useful version.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - Desktop app
        - Web server
        - Agent engine
        - MCP / skills
        - Packaging / updater
        - Documentation
        - Other
