name: Bug Report
description: Report a reproducible problem in NomiFun.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      description: List exact steps, commands, or UI actions.
      placeholder: |
        1. Open ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version Or Commit
      placeholder: "v0.x.x or git SHA"
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - Desktop app
        - Web server
        - Agent engine
        - MCP / skills
        - Packaging / updater
        - Documentation
        - Other
  - type: textarea
    id: logs
    attributes:
      label: Logs Or Screenshots
      description: Paste relevant logs. Remove secrets first.
